core:{name:"Core Questions",v:"1.0",desc:"Universal question set for all deployments",icon:"\uD83D\uDDFA\uFE0F",logo:"https://openteam-agreements.community/assets/logo.png",sections:[
{id:"pre",title:"Pre-Questions",sub:"Ask before recording",qs:[
{id:"pre1",t:"Who are you?",p:"Let them introduce themselves naturally."},
{id:"pre2",t:"Do I have your consent to record this interview?",p:"Explain: audio transcribed, they control visibility, can stop anytime."},
{id:"pre3",t:"How would you describe your work and your project?",p:"Use their language in the profile."},
{id:"pre4",t:"Who do you consider your community?",p:"Note organizations, networks, geographic communities."},
{id:"pre5",t:"What geographic region do you work in?",p:"Granularity: exact, watershed, county, region, general area."}]},
{id:"quick",title:"Quick Pass",sub:"5-10 min profile card",qs:[
{id:"q1",t:"In 1-2 sentences: what knowledge, data, or practice do you steward, and for whom?",p:"Lead line of their profile card."},
{id:"q2",t:"What do you love about your community right now?",p:"Listen for values. Tag with keywords."},
{id:"q3",t:"One decision you made recently about data, practices, sharing, access, or governance.",p:"Concrete recent action."},
{id:"q4",t:"Single most limiting constraint: capacity, funding, policy, tech, risk, trust?",p:"One constraint. Which would you remove first?"},
{id:"q5",t:"One reuse opportunity you wish more people would take advantage of.",p:"Surfaces hidden resources."},
{id:"q6",t:"Easiest next collaboration: who or what would make your work easier next season?",p:"Actionable connection points."},
{id:"q7",t:"Three most important books, events, or papers that inspired your journey?",p:"Intellectual lineage and shared references."}]},
{id:"d1",title:"1 - Community and Story of Change",sub:"Deep interview",qs:[
{id:"d11",t:"Tell a short story about what your community/landscape/work is like now and how it has changed.",p:"Richest question. Give it time."},
{id:"d12",t:"Who are your primary communities or beneficiaries?",p:"Named orgs and unnamed categories."},
{id:"d13",t:"Biggest misunderstandings outsiders have about your work?",p:"Framing tensions."},
{id:"d14",t:"A short story that illustrates this?",p:"Stories beat summaries."}]},
{id:"d2",title:"2 - Workflows and Decisions",sub:"",qs:[
{id:"d21",t:"How is knowledge/data collected or contributed?",p:"Map: field to storage to sharing."},
{id:"d22",t:"What makes something good enough to share or act on?",p:"Quality thresholds."},
{id:"d23",t:"Where does it live? (repos, portals, archives, drives)",p:"Note platform names."},
{id:"d24",t:"What breaks, drifts, or requires ongoing care? Key stewards?",p:"Maintenance reality."}]},
{id:"d3",title:"3 - Interoperability",sub:"",qs:[
{id:"d31",t:"Standards, vocabularies, or formats you use or avoid, and why?",p:"Note standard names."},
{id:"d32",t:"Hardest translation problems?",p:"Metadata, semantics, units, provenance."},
{id:"d33",t:"What would make your work more reusable without increasing risk?",p:"Openness vs safety."}]},
{id:"d4",title:"4 - Trust, Power and Risk",sub:"",qs:[
{id:"d41",t:"Trust map: which institutions do you trust? Where is trust fragile?",p:"Name names if willing."},
{id:"d42",t:"Risk posture: what do you share openly vs restrict? Why?",p:"Logic behind decisions."},
{id:"d43",t:"What harms are you actively preventing?",p:"Misuse, extraction, surveillance."}]},
{id:"d5",title:"5 - Governance and Reciprocity",sub:"",qs:[
{id:"d51",t:"Who decides access, terms, and updates?",p:"Formal vs actual authority."},
{id:"d52",t:"What reciprocity do you expect from users?",p:"Attribution, share-backs, funding."},
{id:"d53",t:"What enforcement feels real, not symbolic?",p:"Licenses, norms, technical controls."}]},
{id:"d6",title:"6 - Offers, Asks and Futures",sub:"",qs:[
{id:"d61",t:"What can you offer the network?",p:"Tools, templates, training, hosting."},
{id:"d62",t:"What would help you move faster or more safely in 6 months?",p:"Concrete asks."},
{id:"d63",t:"2-3 years from now, what shows we made progress together?",p:"Forward-looking."}]}]},

concordance:{name:"Ag Knowledge Concordance",v:"1.1",desc:"Mapping agricultural data, archives, and knowledge networks",icon:"\uD83D\uDD17",logo:"https://agricultural-knowledge-concordance.github.io/Ag-Knowledge-Concordance/assets/logo.png",sections:[
{id:"cp",title:"Pre-Questions",sub:"Before recording — maps to onboarding form",qs:[
{id:"cp1",t:"Who are you, and what organization or community are you affiliated with?",p:"Name, role, organization. Note if independent practitioner."},
{id:"cp2",t:"Consent to record? This conversation feeds the Concordance project map and may be used to build your project profile.",p:"Audio stays local. They review transcript before anything is shared."},
{id:"cp3",t:"Are you primarily a data steward, a data user, part of a data network, or affiliated with an archive?",p:"From the form: archive (long-term preservation), data network (providers/aggregators), data steward, data user, data practitioner. People may be several."},
{id:"cp4",t:"Have you participated in a Concordance event before? What brought you here?",p:"Online, in-person, or first time. Sets context for depth of questions."},
{id:"cp5",t:"What is the primary focus of your work, and what geographic region or communities does it serve?",p:"Agriculture, climate, food systems, indigenous knowledge, other. Note scale."}]},
{id:"cq",title:"Concordance Quick Pass",sub:"5-10 min",qs:[
{id:"cq1",t:"Who do you consider your community in this work, and what do you love about being part of it?",p:"Relational ties first. Other data stewards, farmers, researchers, archivists, indigenous partners, agencies."},
{id:"cq2",t:"If you produce or curate datasets, tell me what they are and how they are currently stored and updated.",p:"Direct from the form. Note platforms, formats, update frequency, who has access."},
{id:"cq3",t:"Tell me about a time your data or knowledge connected with someone else's work in a way that mattered.",p:"Story prompt. Surfaces value of interoperability and unexpected connections."},
{id:"cq4",t:"What is the most urgent or endangered archive or dataset you are aware of that needs attention right now?",p:"Direct from the form. Data at risk of loss, defunding, format obsolescence, or institutional collapse."},
{id:"cq5",t:"What gives you hope about the future of shared agricultural knowledge?",p:"End on hope. What is emerging, getting better, worth building toward?"}]},
{id:"cd",title:"Data Sovereignty and Networks",sub:"Deep interview",qs:[
{id:"cd1",t:"What is the key research network or indigenous community you are engaging with around data sovereignty and knowledge preservation?",p:"Direct from the form. Listen for governance protocols, CARE principles, tribal data sovereignty, community data trusts."},
{id:"cd2",t:"Tell me a story about what happens when agricultural data crosses a boundary it was not designed to cross — between institutions, communities, nations, or languages.",p:"Narrative of friction or unexpected connection. Reveals where concordance is most needed."},
{id:"cd3",t:"Who depends on the data or knowledge you maintain, and whose work do you depend on to do yours?",p:"Map mutual dependencies. Upstream sources, downstream users, peer archives, complementary datasets."},
{id:"cd4",t:"When you share data, what do you need to know about who is receiving it and how they will use it? When does sharing feel extractive?",p:"Trust conditions. Governance requirements. Note the red lines."},
{id:"cd5",t:"What governance or reciprocity practices would make you more willing to connect your work to a shared network like the Concordance?",p:"Attribution, access control, review rights, benefit sharing. What earns trust?"}]},
{id:"cf",title:"Offers, Asks and Futures",sub:"",qs:[
{id:"cf1",t:"What is one topic you would like to see covered or discussed in future Concordance convenings?",p:"Direct from the form. Note gaps in current conversation."},
{id:"cf2",t:"What other projects are you working on in this space that the Concordance should know about?",p:"From the form. Note URLs, partner organizations, related initiatives. Larger projects should fill out their own form."},
{id:"cf3",t:"What can you offer the Concordance network, and what would help you connect your work to others in the next 6 months?",p:"Offer and ask. Data, metadata, vocabularies, crosswalks, training, introductions. Concrete needs."},
{id:"cf4",t:"Is there anything else we should capture — something this conversation has not yet asked about?",p:"Direct from the form. Open-ended catch-all. Often produces the most important insight."}]}]},

grazing:{name:"Talk to the Land",v:"1.1",desc:"Place-based stewards and conservation districts",icon:"\uD83C\uDF3E",logo:"https://openteam-agreements.community/assets/logo.png",sections:[
{id:"gp",title:"Pre-Questions",sub:"Before recording",qs:[
{id:"gp1",t:"Who are you?",p:"Name, operation, landscape."},
{id:"gp2",t:"Consent to record?",p:"Outputs: land profile, community map."},
{id:"gp3",t:"Your landscape and work?",p:"How they name their place."},
{id:"gp4",t:"Your community?",p:"Ranchers, agencies, tribes, neighbors."},
{id:"gp5",t:"Geographic region?",p:"Ranch, watershed, county, region."}]},
{id:"gq",title:"Grazing Quick Pass",sub:"5-7 min",qs:[
{id:"gq1",t:"Your grazing landscape in 1-2 sentences. What should we call this place on the map?",p:"Their name becomes the map label."},
{id:"gq2",t:"Who do you consider your community out here, and what do you love about being part of it?",p:"Listen for relational ties: neighbors, agencies, tribal partners, buyers. Note who they depend on and who depends on them."},
{id:"gq3",t:"Tell me about a time you and a neighbor or partner depended on each other to get through a hard season.",p:"Story prompt. Surfaces mutual aid, shared infrastructure, reciprocity. Let them talk."},
{id:"gq4",t:"One key signal you watch that tells you this land is heading in the right direction.",p:"Their indicator of hope. Soil, plants, water, wildlife, community engagement."},
{id:"gq5",t:"What is the tightest constraint on your stewardship right now?",p:"One constraint. Capacity, money, permits, climate, trust."},
{id:"gq6",t:"What gives you hope about the future of this landscape and the people caring for it?",p:"End on hope. Connect to their vision of a good future."}]},
{id:"gc",title:"Land, Community and Governance",sub:"Deep interview",qs:[
{id:"gc1",t:"Tell me the story of this place: what was it like when you first came to it, and what has changed since?",p:"Give this time. The narrative arc reveals values, loss, and aspiration."},
{id:"gc2",t:"Who else does this land depend on, and who depends on what happens here?",p:"Map the web: downstream water users, wildlife, neighboring operations, tribal ties, fire crews, agencies, markets."},
{id:"gc3",t:"Tell me about a decision that could not have been made alone — one that required coordination across boundaries or interests.",p:"Story of mutual dependency. Allotments, water, fire, predators, easements."},
{id:"gc4",t:"Where does authority over this landscape sit, and where does the real knowledge sit? Are those the same people?",p:"Often different. Note the gap between formal authority and situated expertise."}]},
{id:"gpr",title:"Practices and Decision Triggers",sub:"",qs:[
{id:"gpr1",t:"Walk me through a grazing decision you made this year — what did you see, who did you talk to, and what did you do?",p:"Narrative of practice in action. Observation, consultation, decision, outcome."},
{id:"gpr2",t:"When conditions change fast — drought, fire, early snow — who do you call first, and what do you need from them?",p:"Crisis reveals true dependencies. Note the mutual aid network."},
{id:"gpr3",t:"What tradeoff keeps you up at night — where two things you care about are in tension?",p:"Production vs habitat, short vs long term, individual vs collective."},
{id:"gpr4",t:"What do you know about this land that is not written down anywhere?",p:"Tacit knowledge. The kind that would be lost if they left."},
{id:"gpr5",t:"What counts as credible evidence about this landscape, and to whom? Where do your observations and the agency's data disagree?",p:"Epistemic tension. Local knowledge vs institutional metrics."}]},
{id:"gt",title:"Trust, Sharing and Data Trust",sub:"",qs:[
{id:"gt1",t:"Where is trust strong vs fragile?",p:"Institutions, neighbors, agencies."},
{id:"gt2",t:"What data sharing feels safe? Extractive?",p:"Governance requirements."},
{id:"gt3",t:"If we built a data trust, what must it protect?",p:"Red lines, sacred knowledge."},
{id:"gt4",t:"Who should be beneficiaries? Stewards?",p:"Note the distinction."},
{id:"gt5",t:"Acceptable access tiers?",p:"Public, members, research, steward-only."},
{id:"gt6",t:"What makes you opt in? Opt out?",p:"Conditions for participation."},
{id:"gt7",t:"What enforcement would feel real?",p:"Norms, legal, technical, reputation."}]},
{id:"gf",title:"Offers, Asks and Futures",sub:"",qs:[
{id:"gf1",t:"What can you offer?",p:"Land access, data, mentorship, knowledge."},
{id:"gf2",t:"What would help you?",p:"Next 6 months."},
{id:"gf3",t:"What should never be misunderstood out of context?",p:"Redaction guidance."}]}]},

lwg:{name:"Talk to your District",v:"1.1",desc:"NRCS Local Working Group needs assessments",icon:"\uD83C\uDFDB\uFE0F",logo:"https://marionswcd.org/wp-content/uploads/NACD-logo.png",sections:[
{id:"lp",title:"Pre-Questions",sub:"Before recording",qs:[
{id:"lp1",t:"Who are you, and what is your connection to this conservation district?",p:"Role, organization, how long involved, what brought them here."},
{id:"lp2",t:"Consent to record? Your voice will feed the Conservation Needs Assessment for this district.",p:"Explain how input shapes priorities and program delivery."}]},
{id:"lm",title:"Resource Concerns and Priorities",sub:"Feeds Conservation Needs Assessment",qs:[
{id:"lm1",t:"Who do you consider your community in conservation work here, and what do you love about this landscape?",p:"Start relational. Note the people and the place they care about together."},
{id:"lm2",t:"Tell me the story of a resource concern you have watched develop — what did it look like five years ago, and what does it look like now?",p:"Narrative of change over time. More revealing than a list of concerns."},
{id:"lm3",t:"Where on this landscape do you see the greatest need and the greatest opportunity close together?",p:"Invite pointing on a map. Geographic specificity for the report."},
{id:"lm4",t:"Tell me about a practice or innovation happening here that the reporting systems do not capture.",p:"Story of invisible success. Innovation below the institutional threshold."},
{id:"lm5",t:"When a producer here needs help, who do they actually call first — and how does that connect to the formal system?",p:"Maps the real network vs the org chart. Note dependencies, gaps, trust relationships."},
{id:"lm6",t:"What local knowledge about this landscape should inform conservation planning but currently does not?",p:"Situated knowledge. The kind that does not fit a database field but changes outcomes."},
{id:"lm7",t:"Who are the key stewards here — the people whose knowledge about this landscape would be hardest to replace?",p:"Names for the structural map. People the district should be in deep conversation with."},
{id:"lm8",t:"If you could change one thing about how conservation technical assistance is delivered here, what would it be?",p:"Policy recommendation for the State Technical Committee."},
{id:"lm9",t:"What gives you hope about conservation in this district? What does success look like in 3 years?",p:"End on hope and vision. Feeds the 3-year plan."}]},
{id:"lf",title:"Funding and Recommendations",sub:"",qs:[
{id:"lf1",t:"Tell me about a time a conservation program really worked here — what made it succeed, and who made it happen?",p:"Story of success. Reveals what to invest in. Note the dependencies."},
{id:"lf2",t:"What are the funding gaps — where is there need that no current program reaches?",p:"Unserved needs for the funding table."},
{id:"lf3",t:"Are there resource concerns that cross district or county lines? Who would need to be at the table to address them?",p:"Regional coordination. Note the multi-stakeholder dependencies."},
{id:"lf4",t:"What new initiative would you champion if you had the resources?",p:"Their vision. Innovative practices, pilots, partnerships."}]}]},

farmhack:{name:"Talk to the Farm",v:"1.1",desc:"Farmer-to-farmer knowledge, open source tools",icon:"\uD83D\uDD27",logo:"https://farmhack.org/sites/default/files/styles/large/public/2025-08/farm-hack-logo.png.webp?itok=DpXsmA-n",sections:[
{id:"fp",title:"Pre-Questions",sub:"Before recording",qs:[
{id:"fp1",t:"Who are you?",p:"Name, farm, what you grow or build."},
{id:"fp2",t:"Consent to record?",p:"Output: tool card, practitioner profile for the network."},
{id:"fp3",t:"Your farm or project?",p:"Scale, location, what it produces."}]},
{id:"fq",title:"Quick Pass",sub:"5-10 min",qs:[
{id:"fq1",t:"Who do you consider your community, and what do you love about farming alongside them?",p:"Listen for who they learn from, share with, depend on. The relational fabric."},
{id:"fq2",t:"Tell me the story of a tool, hack, or technique you developed or adapted — what problem did it solve, and who helped?",p:"Story of innovation. Note the collaborators and dependencies."},
{id:"fq3",t:"Has anyone else picked it up or adapted it? Tell me what happened.",p:"Replication narrative. The strongest evidence a tool card can carry."},
{id:"fq4",t:"What documentation exists — and what would make it easier for the next person to build or use this?",p:"Plans, photos, instructions, parts, costs. Note the gap."},
{id:"fq5",t:"Tell me about the most useful thing you ever learned from another farmer, not from an institution.",p:"Peer-to-peer knowledge transfer story. Heart of Farm Hack."},
{id:"fq6",t:"What commercial tool do you wish had an open-source alternative, and why?",p:"Demand signal. Note the dependency they want to break."},
{id:"fq7",t:"What gives you hope about farmers helping each other build better tools and systems?",p:"End on hope. What is emerging, working, worth investing in."}]},
{id:"fd",title:"Deeper — Knowledge and Sharing",sub:"",qs:[
{id:"fd1",t:"What do you know about your farm that is hard to write down — the kind of thing you would have to show someone?",p:"Tacit knowledge. The kind that needs demonstration, not documentation."},
{id:"fd2",t:"Tell me about a time you shared data or knowledge from your farm and it led to something unexpected.",p:"Story of knowledge flow. Positive or cautionary. Surfaces the real value and risk of sharing."},
{id:"fd3",t:"Who depends on what you know, and whose knowledge do you depend on to run your operation?",p:"Mutual dependency map. Suppliers, neighbors, extension, veterinarians, mechanics, seed savers."},
{id:"fd4",t:"What is broken about how agricultural knowledge moves from research to the people who need it?",p:"The extension gap from their perspective. Note what they trust vs what they dismiss."},
{id:"fd5",t:"What can you offer the Farm Hack network — and what would help you most in the next growing season?",p:"Offer and ask in one question. Skills, tools, hosting, testing, mentorship, land."},
{id:"fd6",t:"If we could build one thing together as a community of farmer-innovators, what should it be?",p:"Collective vision. What is worth pooling effort for."}]}]},

gosh:{name:"GOSH / Open Science Hardware",v:"1.1",desc:"Open source scientific instruments",icon:"\uD83D\uDD2C",logo:"https://openhardware.science/wp-content/uploads/2021/08/gosh-logo.png",sections:[
{id:"ghp",title:"Pre-Questions",sub:"Before recording",qs:[
{id:"ghp1",t:"Who are you?",p:"Name, affiliation, field."},
{id:"ghp2",t:"Consent to record?",p:"Output: hardware registry entry and community map."},
{id:"ghp3",t:"Your project or instrument?",p:"What it measures, who uses it, current status."}]},
{id:"ghm",title:"Hardware, Community and Adoption",sub:"",qs:[
{id:"ghm1",t:"Who do you consider your community in open hardware, and what do you love about being part of it?",p:"Listen for the relational web: collaborators, users, maintainers, mentors. Who depends on whom."},
{id:"ghm2",t:"Tell me the story of the instrument or hardware you have built or adapted — what problem were you solving, and who else was involved?",p:"Origin narrative. Note the collaborations and dependencies that made it possible."},
{id:"ghm3",t:"Walk me through what it takes for someone else to reproduce your design — where does the chain break?",p:"Documentation, calibration, parts sourcing, tacit knowledge. The reuse pathway and its gaps."},
{id:"ghm4",t:"Tell me about a time your hardware was used by someone you did not expect, or in a way you did not anticipate.",p:"Story of adoption. Surfaces unexpected interdependencies and value."},
{id:"ghm5",t:"What institutional barrier has been hardest to overcome — the thing that keeps open hardware from being accepted where it should be?",p:"Story of friction. Certification, regulation, procurement, credibility."},
{id:"ghm6",t:"Who depends on the data your instruments generate, and whose instruments or data do you depend on?",p:"Mutual dependency map across the hardware-data boundary. Often invisible."},
{id:"ghm7",t:"What would make the biggest difference for open hardware in the next year — what is the bottleneck everyone feels?",p:"Shared constraint. Funding, documentation standards, certification pathways, community infrastructure."},
{id:"ghm8",t:"What can you offer the network, and what would help you move faster?",p:"Offer and ask. Designs, calibration data, mentorship, manufacturing contacts, funding, partnerships."},
{id:"ghm9",t:"What gives you hope about the future of open scientific instruments and the communities building them?",p:"End on hope. What is emerging, gaining traction, worth believing in."}]}]},

{id:"ds-pre",title:"Pre-Questions",sub:"Ask before recording — consent & rapport",qs:[
{id:"ds-pre1",t:"What is your role, and what are the top 3 outcomes you’re accountable for?",p:"Let them frame their own work in their own words. Note the exact language — these phrases anchor the rest of the interview."},
{id:"ds-pre2",t:"As we consider more automation and AI tools, what is one part of your work that is absolutely sacred — a human touch that should never be handed off to a system?",p:"Surfaces values before process. Answers here calibrate how to present Section 7 recommendations."},
{id:"ds-pre3",t:"Beyond job duties, how does a new person on your team learn the ‘unwritten rules’ of how this organization actually works?",p:"Rapport-builder. Reveals cultural knowledge that lives only in people. Often surfaces the Single Point of Failure before you reach Section 5."},
{id:"ds-pre4",t:"Your answers will be confidentially analyzed and presented to leadership as a patterns map — not attributed to you individually unless you choose. How would you prefer to appear? (Named / Role-only / Anonymous)",p:"Record their preference explicitly. Confirm quoting permission: named quote, role-only, paraphrase only, or no quotes."}]},
{id:"ds-quick",title:"Quick Pass",sub:"5–10 minutes — minimal operational profile",qs:[
{id:"ds-q1",t:"What are the top 2–3 metrics you track in your role, and how easy is it to pull that data when you need it?",p:"Listen for friction in data access. ‘I have to manually calculate it’ or ‘I have to ask someone’ are the key signals."},
{id:"ds-q2",t:"If one recurring administrative task could be eliminated from your week, what would it be — and what would you do with the reclaimed time?",p:"The task they name is the automation target. The reclaimed-time answer reveals what they actually value doing. Note both."},
{id:"ds-q3",t:"For your most critical recurring process — what is the very first trigger, and what does ‘done’ look like?",p:"Pin them to a specific process. If they go vague: ‘Which one causes the most stress when something goes wrong?’"},
{id:"ds-q4",t:"Describe a task where you regularly copy or re-enter data from one place to another. What data, and between which systems?",p:"The Human API question. Name the specific systems. Often the highest-ROI automation target in the organization."},
{id:"ds-q5",t:"Which process or piece of institutional knowledge is most dependent on a single person? What happens if they’re unavailable for two weeks?",p:"Listen for role names, not just function names. Probe: ‘Who would you call at 9pm if something went wrong?’"}]},
{id:"ds-1",title:"Section 1 — Strategic Vision",sub:"Anchor improvements to organizational goals",qs:[
{id:"ds-1-1",t:"In your own words, what is the organization’s primary goal for this year — and what does ultimate success look like in 12–18 months?",p:"Listen for how they define success. Outputs (we ran X programs) vs. outcomes (participants reported Y change)."},
{id:"ds-1-2",t:"What are the top 3–5 metrics you track, and how easy or difficult is it to gather the data for each one?",p:"For each metric, probe the data-gathering friction. ‘We have to manually update a Google Sheet’ is the signal. Note the specific tool or file name."},
{id:"ds-1-3",t:"Think of a recent significant strategic decision. What information was critical to making it, and how was it gathered?",p:"Surfaces how decisions actually get made vs. how they’re supposed to be made. Manual searches through old feedback point to knowledge management gaps."},
{id:"ds-1-4",t:"What is one capability or process you need to strengthen to better serve your community — something that feels like a real gap right now?",p:"Let them prioritize. If they list several: ‘If you could only fix one, which one is costing you the most right now?’"},
{id:"ds-1-5",t:"What is your greatest operational strength? And what area would be most strained by a 50% increase in clients or projects?",p:"The strength answer builds the narrative map. The strain answer is the scalability bottleneck. Probe: ‘What specifically would break — a person, a spreadsheet, a process step?’"}]},
{id:"ds-2",title:"Section 2 — Roles & Daily Work",sub:"Individual responsibilities and collaboration patterns",qs:[
{id:"ds-2-1",t:"Walk me through a typical workday. What recurring tasks or meetings are on your calendar, and what are the most common sources of interruption?",p:"Listen for time sinks. ‘I spend an hour every morning cross-referencing the calendar’ is a high-value signal."},
{id:"ds-2-2",t:"How do you determine what to work on each day? A formal task list, email instructions, a personal system, or something else?",p:"Reactive prioritization is itself a scalability risk. Note whether their system would survive a sudden increase in volume."},
{id:"ds-2-3",t:"Who are the top 3–5 people you collaborate with most frequently, and what tools or methods do you use?",p:"Note specific tool names (Google Chat, shared Sheets, email threads). Builds the collaboration layer of the structural map."},
{id:"ds-2-4",t:"If one recurring administrative or low-value task could be eliminated, what would it be — and what high-value work would you do with the reclaimed time?",p:"The task named is the automation candidate. Example: ‘Manually creating invoices from what the team sends me.’"}]},
{id:"ds-3",title:"Section 3 — Core Process Deep Dive",sub:"Map one high-value recurring process end to end",qs:[
{id:"ds-3-1",t:"For a critical recurring process — onboarding a participant, booking a space, processing a grant — what is the absolute starting point, and what final action means it’s 100% complete?",p:"Pin them to one specific process. If they waver: ‘Which one causes the most downstream problems when something goes wrong?’"},
{id:"ds-3-2",t:"Describe the key stages of that process. At each handoff, how is work and information transferred — and where do handoffs most often stall?",p:"Listen for handoffs via email or chat rather than a system. Each informal handoff is a potential failure point."},
{id:"ds-3-3",t:"What is the most common exception or variation to this process, and how much manual effort does it require?",p:"Exceptions reveal complexity that formal process docs hide. Probe: ‘How often does that happen — once a week? Once a month?’"},
{id:"ds-3-4",t:"How long does this process take from start to finish? Where is the most wait time — where work sits idle waiting for the next action or approval?",p:"Wait time reveals approval bottlenecks or dependency on a specific person’s availability."},
{id:"ds-3-5",t:"At what point is a human review absolutely essential to catch errors? What specific information is being verified?",p:"This defines where automation should stop. Often reveals QC that exists only in someone’s head."},
{id:"ds-3-6",t:"How would a leader find the current status of this process at any given moment — which document, system, or person would they consult?",p:"If the answer is ‘they’d ask me’ or ‘check the spreadsheet but it might not be updated,’ that’s a visibility gap."}]},
{id:"ds-4",title:"Section 4 — Data & Information Flow",sub:"Identify silos, integrity gaps, and manual workarounds",qs:[
{id:"ds-4-1",t:"Walk me through compiling a major grant report. Where do the required data points actually come from?",p:"Map each system, spreadsheet, or person they contact. Number of sources for a single report is the fragmentation score."},
{id:"ds-4-2",t:"If a major donor asked for a detailed breakdown of how their specific contribution was used last quarter, what steps would produce that answer?",p:"The transparency test. How long would it take? How many systems? Under an hour, or days?"},
{id:"ds-4-3",t:"Describe a routine task where you manually copy or re-enter data from one system to another. What specific data, and between which systems?",p:"The Human API question. Each instance is a candidate for automation via Zapier, Make, or a custom integration."},
{id:"ds-4-4",t:"Where would you find the definitive, most up-to-date version of a key item — budget, contact list, program roster? If you found conflicting versions, how would you determine which is correct?",p:"If the answer is ‘I’d ask [person]’ rather than a system, that’s a source-of-truth gap."},
{id:"ds-4-5",t:"What is a critical business question that’s currently difficult to answer because the data is scattered across multiple systems?",p:"The strategic data gap. Often becomes the primary use case for a unified dashboard."},
{id:"ds-4-6",t:"What is the most complex or vital spreadsheet your team relies on? What core problem does it solve that your primary software tools don’t?",p:"The Shadow IT question. The spreadsheet is solving a real problem the official toolstack can’t handle. Ask to see it if possible."}]},
{id:"ds-5",title:"Section 5 — Scalability & Risk",sub:"Pressure-test operations under stress",qs:[
{id:"ds-5-1",t:"If the volume of clients or projects doubled next month, what specific process, tool, or person would break first?",p:"Push for specificity. ‘Everything would be hard’ is not the answer. Probe: ‘If you had to point to the first domino, what would it be?’"},
{id:"ds-5-2",t:"Which process or piece of institutional knowledge is most dependent on a single individual? What would be the impact if that person were unavailable for two weeks?",p:"Make it safer: ‘This isn’t about performance — it’s about resilience. Where would you feel most nervous if someone was out sick for a month?’"},
{id:"ds-5-3",t:"Think of a recent time a small error was made early in a process. How far did it travel downstream before it was caught, and how much rework did it require?",p:"A specific story is more useful than a general description. Probe: ‘Can you think of a specific example? It doesn’t have to be dramatic.’"},
{id:"ds-5-4",t:"What is the most complex workaround or ‘unwritten rule’ that would be hardest to teach someone new in your role? Why does this workaround exist?",p:"The workaround exists because the official system doesn’t handle the real situation. Understanding why is more important than the workaround itself."}]},
{id:"ds-6",title:"Section 6 — Knowledge & Community",sub:"Institutional memory, feedback loops, and compliance",qs:[
{id:"ds-6-1",t:"When planning a new program or applying for a grant, how do you access lessons learned, budgets, and vendor info from previous initiatives?",p:"If the answer is ‘we ask the person who ran it last time’ or ‘we search old emails,’ that’s a knowledge management gap."},
{id:"ds-6-2",t:"Describe the journey of feedback from a program participant. How is it collected, stored, reviewed — and how does it actually influence changes?",p:"Map the full loop: collection → storage → reviewer → decision. Most orgs collect feedback but the loop from feedback to change is broken."},
{id:"ds-6-3",t:"How do we communicate back to participants that their feedback was heard and led to a change?",p:"Many organizations skip this entirely. If they can’t name a mechanism, that’s a community trust gap."},
{id:"ds-6-4",t:"How do we ensure every project follows the same critical steps every time? Is it a checklist, a template, a system workflow — and how is adherence verified?",p:"‘We trust people to remember’ is the most common and highest-risk answer."}]},
{id:"ds-7",title:"Section 7 — Future State",sub:"From problem identification to high-impact interventions",qs:[
{id:"ds-7-0",t:"Based on everything you’ve described — if you could change exactly one thing about how information or work flows in your role, what would it be and why?",p:"The grounding question. Ask this before the technology questions to anchor the conversation in specific pain points already surfaced."},
{id:"ds-7-1",t:"Think of a frequent manual task and complete this sentence: ‘When [X event] happens, I always have to manually [Y action].’",p:"Listen for the trigger event and the manual action separately — both are needed to design the automation."},
{id:"ds-7-2",t:"Thinking bigger: describe the single most valuable ‘If This, Then That’ rule you could implement across the organization — connecting multiple systems or teams.",p:"Example: ‘IF a major donation is logged, THEN create a thank-you task for the ED AND notify marketing.’"},
{id:"ds-7-3",t:"Beyond simple automation, where could an AI assistant have the most transformative impact on your work — helping you think, make decisions, or analyze data?",p:"Distinguish task automation (doing) from intelligent augmentation (thinking). Probe: ‘What decision do you make repeatedly that you wish you had better data for?’"},
{id:"ds-7-4",t:"If you could design a single dashboard with real-time data from all your key systems, what are the top 5 pieces of information it would need to show?",p:"Write down the 5 items in priority order. First named is usually most important. Each maps to a data source needing integration."},
{id:"ds-7-5",t:"Which of your core tools has the most untapped potential? Which would give the biggest strategic advantage if you became true power users?",p:"Listen for tools used at 20% of their capability. Often surfaces a lower-cost path than buying new software."},
{id:"ds-7-6",t:"On a scale of 1 (hesitant) to 5 (excited), how do you feel about integrating more AI and automation into your daily work? What are your biggest questions or concerns?",p:"The concerns named are real implementation risks — write them verbatim. Each needs to be addressed in the change management plan."}]}
]}
