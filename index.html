{id:"d1",title:"Section 1 - Community and Story of Change",sub:"Deep interview",qs:[

{id:"d12",t:"Who are your primary communities or beneficiaries? Downstream users?",p:"Named orgs and unnamed categories."},
{id:"d13",t:"Biggest misunderstandings outsiders have about your work?",p:"Framing tensions for narrative map."},
{id:"d14",t:"A short story that illustrates this?",p:"Stories produce better quotes than summaries."}]},
{id:"d2",title:"Section 2 - Workflows and Decisions",sub:"",qs:[
{id:"d21",t:"How is knowledge/data collected or contributed?",p:"Map the workflow: field to storage to sharing."},
{id:"d22",t:"What makes something good enough to share or act on?",p:"Quality thresholds differ per community."},
{id:"d23",t:"Where does it live? (repos, portals, archives, drives)",p:"Note platform names and URLs."},
{id:"d24",t:"What breaks, drifts, or requires ongoing care? Key stewards? Dependencies?",p:"Maintenance reality."}]},
{id:"d3",title:"Section 3 - Interoperability",sub:"",qs:[
{id:"d31",t:"Standards, vocabularies, or formats you use (or avoid), and why?",p:"Note specific standard names."},
{id:"d32",t:"Hardest translation problems?",p:"Metadata, semantics, units, provenance, context."},
{id:"d33",t:"What would make your work more reusable without increasing risk?",p:"Openness vs safety tension."}]},
{id:"d4",title:"Section 4 - Trust, Power and Risk",sub:"",qs:[
{id:"d41",t:"Trust map: which institutions do you trust? Where is trust fragile?",p:"Name names if willing."},
{id:"d42",t:"Risk posture: what do you share openly vs restrict? Why?",p:"Logic behind sharing decisions."},
{id:"d43",t:"What harms are you actively preventing?",p:"Misuse, extraction, misinterpretation, surveillance."}]},
{id:"d5",title:"Section 5 - Governance and Reciprocity",sub:"",qs:[
{id:"d51",t:"Who decides access, terms, and updates?",p:"Formal vs actual authority."},
{id:"d52",t:"What reciprocity do you expect from users?",p:"Attribution, share-backs, co-authorship, funding."},
{id:"d53",t:"What enforcement feels real, not symbolic?",p:"Licenses, agreements, norms, technical controls."}]},
{id:"d6",title:"Section 6 - Offers, Asks and Futures",sub:"",qs:[
{id:"d61",t:"What can you offer the network?",p:"Tools, templates, training, hosting, introductions."},
{id:"d62",t:"What would help you move faster or more safely in 6 months?",p:"Concrete asks."},
{id:"d63",t:"Plausible better future: 2-3 years from now, what shows progress?",p:"Forward-looking. Feeds scenario planning."}]}]},
